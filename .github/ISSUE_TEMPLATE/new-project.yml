name: Nuovo progetto
description: Proponi un nuovo progetto o dataset per il Lab.
title: "progetto: "
labels:
  - project-proposal
body:
  - type: textarea
    id: question
    attributes:
      label: Domanda civica
      description: Formula la domanda in una frase chiara.
      placeholder: Quale domanda pubblica o civica vuoi affrontare?
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: Dati disponibili
      description: Quali fonti pubbliche pensi di usare?
      placeholder: Inserisci dataset, enti o fonti ufficiali conosciute.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Utilita pubblica
      description: Perche questo progetto sarebbe utile?
      placeholder: Spiega chi potrebbe trarne beneficio e in che modo.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output immaginato
      description: Che tipo di risultato pubblico immagini?
      placeholder: Dashboard, pagina pubblica, report, dataset documentato...
  - type: textarea
    id: notes
    attributes:
      label: Note utili
      description: Aggiungi limiti, rischi o collegamenti utili.
      placeholder: Eventuali vincoli, dubbi o link.
